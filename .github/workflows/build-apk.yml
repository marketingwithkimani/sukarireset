name: Build & Release Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: app


      - name: Build web app (Vite)
        run: npm run build
        working-directory: app

      - name: Sync Capacitor Android
        run: npx cap sync android
        working-directory: app

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle


      - name: Make gradlew executable
        run: chmod +x ./gradlew
        working-directory: app/android

      # ─── KEYSTORE LOGIC ──────────────────────────────────────────────────
      # If secrets are provided, use them. 
      # If NOT, generate a temporary one so the build doesn't fail and users get an APK.
      - name: Prepare Keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using provided secrets..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/android/app/release.keystore
            echo "signed=true" >> $GITHUB_OUTPUT
          else
            echo "Secrets missing. Generating temporary key for auto-download..."
            keytool -genkey -v -keystore app/android/app/release.keystore -alias sukarireset -keyalg RSA -keysize 2048 -validity 10000 -storepass sukari2026 -keypass sukari2026 -dname "CN=Sukari Reset, OU=App, O=Sukari, L=Nairobi, ST=Nairobi, C=KE"
            echo "KEYSTORE_PASSWORD=sukari2026" >> $GITHUB_ENV
            echo "KEY_ALIAS=sukarireset" >> $GITHUB_ENV
            echo "KEY_PASSWORD=sukari2026" >> $GITHUB_ENV
            echo "signed=true" >> $GITHUB_OUTPUT
          fi

      - name: Build release APK
        run: ./gradlew assembleRelease
        working-directory: app/android
        env:
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD || secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS || secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD || secrets.KEY_PASSWORD }}

      - name: List Generated APKs (Debug)
        run: find app/android/app/build/outputs/apk -name "*.apk"

      - name: Prepare APK for Release
        run: |
          # Find the generated APK and move it to a predictable location
          APK_PATH=$(find app/android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          cp "$APK_PATH" Sukari_Reset_Companion.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sukari_Reset_Companion
          path: Sukari_Reset_Companion.apk
          retention-days: 90

      - name: Get short SHA
        id: sha
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.sha.outputs.sha }}
          name: "Sukari Reset v1.0 — Build ${{ steps.sha.outputs.sha }}"
          body: |
            ## Sukari Reset Companion App
            
            This is the official Android APK for Sukari Reset.
            
            ### 📥 Installation Instructions
            1. Tap the **Sukari_Reset_Companion.apk** link below.
            2. If your phone says "File might be harmful", tap **Download anyway**.
            3. Once downloaded, open the file.
            4. If prompted to allow "Install from unknown sources", go to Settings and enable it for your browser.
            5. Tap **Install** and then **Open**.
            
            > Build ID: ${{ steps.sha.outputs.sha }} (Auto-generated)
          files: Sukari_Reset_Companion.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


